<div class="shell" [class.shell--nav-open]="navOpen()">
  @if (navOpen()) {
    <button
      class="shell__backdrop"
      type="button"
      aria-label="Cerrar menú"
      (click)="closeNav()"
    ></button>
  }

  <aside class="shell__sidebar" [class.shell__sidebar--open]="navOpen()">
    <div class="shell__sidebar-head">
      <div class="shell__brand">
        <app-brand-logo surface="dark" size="sm" />
        <div>
          <strong>OrchestApp</strong>
          <span>Siente la música</span>
        </div>
      </div>
      <button
        class="shell__close-btn oa-btn oa-btn--ghost"
        type="button"
        aria-label="Cerrar menú"
        (click)="closeNav()"
      >
        ✕
      </button>
    </div>

    <nav class="shell__nav">
      @for (item of navItems(); track item.path) {
        <a
          class="shell__nav-item"
          [routerLink]="item.path"
          routerLinkActive="shell__nav-item--active"
          (click)="closeNav()"
        >
          <span class="shell__nav-icon">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="shell__user">
      <div class="shell__avatar">{{ auth.currentUser()?.name?.charAt(0) }}</div>
      <div>
        <strong>{{ auth.currentUser()?.name }}</strong>
        <span>{{ auth.currentUser()?.profileLabel ?? 'Oyente' }}</span>
      </div>
    </div>
  </aside>

  <div class="shell__main">
    <header class="shell__topbar">
      <button
        class="shell__menu-btn oa-btn oa-btn--ghost"
        type="button"
        aria-label="Abrir menú"
        [attr.aria-expanded]="navOpen()"
        (click)="toggleNav()"
      >
        <svg class="shell__menu-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            d="M4 7h16M4 12h16M4 17h16"
          />
        </svg>
        <span>Menú</span>
      </button>
      <button class="oa-btn oa-btn--secondary" (click)="auth.logout()">Salir</button>
    </header>

    <main class="shell__content" [class.shell__content--with-player]="player.hasActivePlayer()">
      <router-outlet />
    </main>
  </div>

  <app-audio-player />
  <app-confirm-dialog />
</div>
